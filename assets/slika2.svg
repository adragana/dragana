<svg width="100%" height="100%" viewBox="0 0 1000 600" xmlns="http://www.w3.org/2000/svg">
  <rect width="100%" height="100%" fill="#1a1a2e"/>

  <defs>
    <linearGradient id="lineGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#4db6ac" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#9c27b0" stop-opacity="0.6"/>
    </linearGradient>

    <radialGradient id="blueNodeGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="40%" stop-color="#00bcd4"/>
      <stop offset="100%" stop-color="#00bcd4" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="purpleNodeGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="40%" stop-color="#ba68c8"/>
      <stop offset="100%" stop-color="#ba68c8" stop-opacity="0"/>
    </radialGradient>
    
    <filter id="glow">
        <feGaussianBlur stdDeviation="3.5" result="coloredBlur"/>
        <feMerge>
            <feMergeNode in="coloredBlur"/>
            <feMergeNode in="SourceGraphic"/>
        </feMerge>
    </filter>
  </defs>

  <g filter="url(#glow)">
    
    <g stroke="url(#lineGrad)" stroke-width="0.8" fill="none">
      <path d="M100,200 L180,280 L250,150 L320,300 L180,280 L120,400 L250,150 Z"/>
      <path d="M100,200 L250,150 M180,280 L320,300 M320,300 L400,220 M120,400 L180,280"/>
      <path d="M50,150 L100,200 M60,300 L120,400 M100,500 L180,450 L120,400"/>
      <path d="M250,50 L300,100 L250,150 M320,300 L380,380"/>

      <path d="M320,300 L450,250 L550,350 L400,380 L320,300 M450,250 L520,180"/>
      <path d="M500,100 L550,150 L450,250 M520,180 L600,220"/>

      <path d="M600,220 L680,120 L750,280 L820,180 L750,280 L650,380 L600,220 Z"/>
      <path d="M600,220 L750,280 M680,120 L820,180 M820,180 L900,250 M650,380 L750,280"/>
      <path d="M600,50 L650,100 L600,220 M650,100 L720,50 L680,120"/>
      <path d="M850,100 L920,150 L820,180 M820,180 L880,100"/>
      <path d="M750,280 L850,350 L800,450 L750,280 M850,350 L950,300"/>
      <path d="M650,380 L700,480 L750,280 M700,480 L600,520"/>
      <path d="M800,450 L880,520"/>
    </g>

    <g fill="url(#blueNodeGrad)">
      <circle cx="100" cy="200" r="5"/>
      <circle cx="180" cy="280" r="6"/>
      <circle cx="250" cy="150" r="5"/>
      <circle cx="320" cy="300" r="6"/>
      <circle cx="120" cy="400" r="5"/>
      <circle cx="400" cy="220" r="4"/>
      <circle cx="450" cy="250" r="5"/>
      
      <circle cx="50" cy="150" r="3"/>
      <circle cx="60" cy="300" r="3"/>
      <circle cx="100" cy="500" r="4"/>
      <circle cx="180" cy="450" r="4"/>
      <circle cx="250" cy="50" r="3"/>
      <circle cx="300" cy="100" r="3"/>
      <circle cx="380" cy="380" r="4"/>
      <circle cx="500" cy="100" r="3"/>
    </g>

    <g fill="url(#purpleNodeGrad)">
      <circle cx="600" cy="220" r="6"/>
      <circle cx="680" cy="120" r="5"/>
      <circle cx="750" cy="280" r="7"/>
      <circle cx="820" cy="180" r="6"/>
      <circle cx="650" cy="380" r="6"/>
      <circle cx="550" cy="350" r="5"/>
      <circle cx="520" cy="180" r="4"/>
      
      <circle cx="600" cy="50" r="3"/>
      <circle cx="650" cy="100" r="3"/>
      <circle cx="720" cy="50" r="3"/>
      <circle cx="850" cy="100" r="3"/>
      <circle cx="880" cy="100" r="3"/>
      <circle cx="920" cy="150" r="4"/>
      <circle cx="900" cy="250" r="3"/>
      <circle cx="850" cy="350" r="4"/>
      <circle cx="950" cy="300" r="3"/>
      <circle cx="800" cy="450" r="4"/>
      <circle cx="700" cy="480" r="4"/>
      <circle cx="600" cy="520" r="3"/>
      <circle cx="880" cy="520" r="3"/>
    </g>
  </g>
</svg>
